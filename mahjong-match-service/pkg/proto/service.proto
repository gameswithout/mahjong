syntax = "proto3";

option csharp_namespace = "AccelByte.Extend.ServiceExtension";
option go_package = "accelbyte.net/extend/serviceextension";
option java_package = "net.accelbyte.extend.serviceextension";
option java_multiple_files = true;

package service;

import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

service Service {
  // JoinMatch creates the authoritative match from the fixed AGS Session
  // roster when necessary, assigns stable seats, and returns only the
  // authenticated caller's view.
  rpc JoinMatch(JoinMatchRequest) returns (JoinMatchResponse) {
    option (google.api.http) = {
      post: "/v1/namespaces/{namespace}/sessions/{session_id}/matches/{match_id}/join"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Join an authoritative Mahjong match"
      description: "Creates the match from the fixed AGS Session roster when needed and returns the authenticated player's private projection."
      security: {
        security_requirement: {
          key: "Bearer"
          value: {}
        }
      }
    };
  }

  // GetMatchState returns a caller-specific projection. Concealed tiles and
  // private claim responses belonging to other players are never included.
  rpc GetMatchState(GetMatchStateRequest) returns (GetMatchStateResponse) {
    option (google.api.http) = {
      get: "/v1/namespaces/{namespace}/sessions/{session_id}/matches/{match_id}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Get the authenticated player's match state"
      description: "Returns the latest authoritative match projection visible to the authenticated Session member."
      security: {
        security_requirement: {
          key: "Bearer"
          value: {}
        }
      }
    };
  }

  // SubmitMatchCommand applies one idempotent player command after validating
  // Session membership, seat ownership, turn ownership, and state version.
  rpc SubmitMatchCommand(SubmitMatchCommandRequest) returns (SubmitMatchCommandResponse) {
    option (google.api.http) = {
      post: "/v1/namespaces/{namespace}/sessions/{session_id}/matches/{match_id}/commands"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Submit an authoritative Mahjong command"
      description: "Durably applies an idempotent draw, discard, or claim command and returns the authenticated player's updated projection."
      security: {
        security_requirement: {
          key: "Bearer"
          value: {}
        }
      }
    };
  }
}

message JoinMatchRequest {
  string namespace = 1;
  string session_id = 2;
  string match_id = 3;
}

message JoinMatchResponse {
  MatchState state = 1;
}

message GetMatchStateRequest {
  string namespace = 1;
  string session_id = 2;
  string match_id = 3;
}

message GetMatchStateResponse {
  MatchState state = 1;
}

enum MatchCommandType {
  MATCH_COMMAND_TYPE_UNSPECIFIED = 0;
  MATCH_COMMAND_TYPE_DRAW = 1;
  MATCH_COMMAND_TYPE_DISCARD = 2;
  MATCH_COMMAND_TYPE_SUBMIT_CLAIM = 3;
}

message SubmitMatchCommandRequest {
  string namespace = 1;
  string session_id = 2;
  string match_id = 3;
  string request_id = 4;
  MatchCommandType type = 5;
  uint64 expected_version = 6;
  string tile_id = 7;
  ClaimCommand claim = 8;
}

message ClaimCommand {
  string action_id = 1;
  string type = 2;
  repeated string tile_ids = 3;
  uint64 response_revision = 4;
  bool deliberate = 5;
}

message SubmitMatchCommandResponse {
  string request_id = 1;
  uint64 state_version = 2;
  string phase = 3;
  MatchState state = 4;
}

// MatchState is a privacy-filtered projection for exactly one authenticated
// player. It is not a serializable authoritative snapshot.
message MatchState {
  string match_id = 1;
  string seat = 2;
  uint64 state_version = 3;
  string phase = 4;
  string active_seat = 5;
  repeated Tile own_hand = 6;
  repeated Tile own_exposed = 7;
  repeated PlayerView players = 8;
  WallView wall = 9;
  Discard last_discard = 10;
  ClaimView claim = 11;
  bool win_locked = 12;
  repeated WaitTileView waits = 13;
  repeated Meld own_melds = 14;
  repeated Discard discards = 15;
  string turn_deadline = 16;
  HandResult hand_result = 17;
  Settlement settlement = 18;
  ContinuationOutcome next_dealer = 19;
}

message Tile {
  string id = 1;
  string kind = 2;
  uint32 rank = 3;
  uint32 copy = 4;
}

message PlayerView {
  string seat = 1;
  int32 hand_count = 2;
  repeated Tile exposed = 3;
  int32 meld_count = 4;
  repeated MeldView melds = 5;
  bool taken_over = 6;
  // is_bot reports whether this seat was never assigned to a human (AI
  // Practice mode), distinct from the broader taken_over — a client uses
  // this to show "Bot" instead of "Auto-playing (disconnected)", which
  // would be misleading for a seat that was never a human to begin with.
  bool is_bot = 7;
}

// Meld is the full, unredacted representation used where redaction is not
// required: a seat's own melds (MatchState.own_melds) and revealed winning
// hand decompositions (HandShape.melds) after showdown.
message Meld {
  string type = 1;
  repeated Tile tiles = 2;
  bool concealed = 3;
  bool added = 4;
  bool claimed = 5;
}

// MeldView is the redacted representation used for other players'
// melds (PlayerView.melds): tiles are omitted for a concealed Kong.
message MeldView {
  string type = 1;
  repeated Tile tiles = 2;
  bool concealed = 3;
}

message WaitTileView {
  Tile tile = 1;
  int32 visible_remaining = 2;
}

message WallView {
  int32 remaining = 1;
  int32 drawable_remaining = 2;
  int32 reserve_remaining = 3;
}

message Discard {
  string seat = 1;
  Tile tile = 2;
  uint64 sequence = 3;
}

message ClaimView {
  string action_id = 1;
  uint64 state_version = 2;
  Discard discard = 3;
  string deadline = 4;
  repeated string eligible = 5;
  ClaimResponse own_response = 6;
  ClaimOptionsView options = 7;
}

message ClaimResponse {
  string action_id = 1;
  string seat = 2;
  string type = 3;
  repeated string tile_ids = 4;
  uint64 state_version = 5;
  uint64 response_revision = 6;
  bool deliberate = 7;
}

// ChowSet is one legal Chow completion: the two tiles from the responding
// seat's own hand that would join the discard.
message ChowSet {
  repeated string tile_ids = 1;
}

message ClaimOptionsView {
  bool can_win = 1;
  bool can_pong = 2;
  bool can_kong = 3;
  repeated ChowSet chow_sets = 4;
  ScoreResult win_preview = 5;
}

message ScoreContext {
  string seat = 1;
  string prevailing_wind = 2;
  bool discard_win = 3;
  bool zimo = 4;
  bool replacement = 5;
  bool last_tile = 6;
  bool robbed_added_kong = 7;
  bool eight_flowers = 8;
  bool earthly_hand = 9;
  bool heavenly_hand = 10;
  bool single_wait = 11;
}

message PatternScore {
  string name = 1;
  int32 tai = 2;
}

message HandShape {
  repeated Tile pair = 1;
  repeated Meld melds = 2;
}

message ScoreResult {
  bool winning = 1;
  int32 raw_tai = 2;
  repeated PatternScore patterns = 3;
  HandShape shape = 4;
  int32 effective_tiles = 5;
}

message HandWinner {
  string seat = 1;
  ScoreContext context = 2;
  ScoreResult score = 3;
}

message HandResult {
  string kind = 1;
  repeated HandWinner winners = 2;
  string payer = 3;
  string winning_tile_id = 4;
}

message Transfer {
  string from = 1;
  string to = 2;
  int64 effective_tai = 3;
  int64 raw_amount = 4;
  int64 amount = 5;
  bool capped = 6;
}

message Settlement {
  repeated Transfer transfers = 1;
  map<string, int64> net = 2;
  int64 total_credits = 3;
  int64 total_debits = 4;
}

message ContinuationOutcome {
  string next_dealer = 1;
  int32 next_continuations = 2;
  bool dealer_retains = 3;
}

option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_swagger) = {
  info: {
    title: "Mahjong Match Service API";
    version: "v1";
  };
  base_path: "/mahjong";

  security_definitions: {
    security: {
      key: "Bearer";
      value: {
        type: TYPE_API_KEY;
        in: IN_HEADER;
        name: "Authorization";
      }
    }
  };
};
