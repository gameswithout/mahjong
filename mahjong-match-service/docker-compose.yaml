services:
  app:
    build: .
    ports:
      - "6565:6565"
      - "8080:8080"
      - "8000:8000"
    environment:
      - AB_CLIENT_ID=${AB_CLIENT_ID}
      - AB_CLIENT_SECRET=${AB_CLIENT_SECRET}
      - AB_BASE_URL=${AB_BASE_URL}
      - AB_NAMESPACE=${AB_NAMESPACE}
      - PLUGIN_GRPC_SERVER_AUTH_ENABLED
      - OTEL_EXPORTER_ZIPKIN_ENDPOINT=${OTEL_EXPORTER_ZIPKIN_ENDPOINT:-}
      - BASE_PATH
      - MATCH_TEST_ROSTER=${MATCH_TEST_ROSTER:-}
      - MATCH_TEST_USER_ID=${MATCH_TEST_USER_ID:-}
      - SQLDB_HOST=${SQLDB_HOST:-postgres:5432}
      - SQLDB_USERNAME=${SQLDB_USERNAME:-postgres}
      - SQLDB_PASSWORD=${SQLDB_PASSWORD:-postgres}
      - SQLDB_DATABASE_NAME=${SQLDB_DATABASE_NAME:-mahjong_match}
      - SQLDB_CA_CERT_FILE_PATH=${SQLDB_CA_CERT_FILE_PATH:-}
      # - GRPC_GO_LOG_VERBOSITY_LEVEL="99" # enable to debug grpc
      # - GRPC_GO_LOG_SEVERITY_LEVEL=info # enable to debug grpc
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - host.docker.internal:host-gateway
    # logging:
    #   driver: loki
    #   options:
    #     loki-url: http://host.docker.internal:3100/loki/api/v1/push
    #     mode: non-blocking
    #     max-buffer-size: 4m
    #     loki-retries: "3"
  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${SQLDB_USERNAME:-postgres}
      - POSTGRES_PASSWORD=${SQLDB_PASSWORD:-postgres}
      - POSTGRES_DB=${SQLDB_DATABASE_NAME:-mahjong_match}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SQLDB_USERNAME:-postgres} -d ${SQLDB_DATABASE_NAME:-mahjong_match}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 5s

volumes:
  postgres_data:
    driver: local
